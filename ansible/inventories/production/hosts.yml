---
# =============================================================================
# Prolab Red Team Infrastructure - Ansible Inventory
# =============================================================================
all:
  vars:
    ansible_user: vagrant
    ansible_password: vagrant
    domain_name: corp.local
    domain_netbios: CORP
    domain_admin_password: "P@ssw0rd!2024"
    domain_controller_ip: 172.16.50.10
    dns_server: 172.16.50.10

  children:
    # ================================================================
    # DMZ Network (192.168.50.x)
    # ================================================================
    dmz:
      hosts:
        dmz-web01:
          ansible_host: 192.168.50.10
          ansible_connection: ssh
          ansible_become: true
          ansible_become_method: sudo
          machine_role: webserver
          cms_type: wordpress  # Vulnerable CMS for RCE/SSRF

        dmz-mail01:
          ansible_host: 192.168.50.11
          ansible_connection: ssh
          ansible_become: true
          ansible_become_method: sudo
          machine_role: mailserver

    # ================================================================
    # Internal Network - Linux (172.16.50.x)
    # ================================================================
    internal_linux:
      hosts:
        dev-linux01:
          ansible_host: 172.16.50.30
          ansible_connection: ssh
          ansible_become: true
          ansible_become_method: sudo
          machine_role: devserver

        mon01-linux:
          ansible_host: 172.16.50.40
          ansible_connection: ssh
          ansible_become: true
          ansible_become_method: sudo
          machine_role: monitoring

    # ================================================================
    # Internal Network - Windows Domain Controller
    # ================================================================
    domain_controllers:
      hosts:
        dc01:
          ansible_host: 172.16.50.10
          ansible_connection: winrm
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore
          ansible_port: 5986
          ansible_winrm_scheme: https
          machine_role: domain_controller

    # ================================================================
    # Internal Network - Windows Servers
    # ================================================================
    windows_servers:
      hosts:
        fs01:
          ansible_host: 172.16.50.11
          ansible_connection: winrm
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore
          ansible_port: 5986
          ansible_winrm_scheme: https
          machine_role: file_server

        db01:
          ansible_host: 172.16.50.12
          ansible_connection: winrm
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore
          ansible_port: 5986
          ansible_winrm_scheme: https
          machine_role: database_server

        app01:
          ansible_host: 172.16.50.13
          ansible_connection: winrm
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore
          ansible_port: 5986
          ansible_winrm_scheme: https
          machine_role: app_server

    # ================================================================
    # Internal Network - Windows Workstations
    # ================================================================
    windows_workstations:
      hosts:
        ws01:
          ansible_host: 172.16.50.21
          ansible_connection: winrm
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore
          ansible_port: 5986
          ansible_winrm_scheme: https
          machine_role: workstation

        ws02:
          ansible_host: 172.16.50.22
          ansible_connection: winrm
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore
          ansible_port: 5986
          ansible_winrm_scheme: https
          machine_role: workstation_delegation

    # ================================================================
    # Logical Groups
    # ================================================================
    linux:
      children:
        dmz:
        internal_linux:

    windows:
      children:
        domain_controllers:
        windows_servers:
        windows_workstations:

    internal:
      children:
        domain_controllers:
        windows_servers:
        windows_workstations:
        internal_linux:
