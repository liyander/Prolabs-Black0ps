---
# =============================================================================
# Role: monitoring
# Target: MON01-LINUX (172.16.50.40)
# Purpose: Deploy monitoring stack with cleartext LDAP bind creds in config
# =============================================================================

- name: Install monitoring prerequisites
  ansible.builtin.apt:
    name:
      - apache2
      - php
      - php-ldap
      - php-mysql
      - php-curl
      - php-gd
      - php-xml
      - libapache2-mod-php
      - snmp
      - snmpd
      - nagios-nrpe-server
      - python3
      - python3-pip
    state: present
    update_cache: yes
  ignore_errors: yes

- name: Start Apache
  ansible.builtin.systemd:
    name: apache2
    state: started
    enabled: yes

# ---- Deploy fake monitoring dashboard ----
- name: Create monitoring web application
  ansible.builtin.file:
    path: /var/www/html/monitoring
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Deploy monitoring dashboard
  ansible.builtin.copy:
    dest: /var/www/html/monitoring/index.php
    content: |
