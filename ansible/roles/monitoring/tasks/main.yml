# ---- VULNERABILITY: Cleartext LDAP credentials in /etc/ ----
- name: Create monitoring config directory
  ansible.builtin.file:
    path: /etc/corp-monitoring
    state: directory
    mode: '0755'

- name: Place LDAP bind credentials in cleartext config
  ansible.builtin.copy:
    dest: /etc/corp-monitoring/ldap.conf
    content: |
      # Corp Monitoring - LDAP Configuration
      # Used for Active Directory user enumeration and monitoring
      # Last modified: 2024-01-15 by admin

      [ldap]
      server   = 172.16.50.10
      port     = 389
      use_ssl  = false
      base_dn  = DC=corp,DC=local

      # Service account for LDAP bind
      bind_dn  = CN=svc_monitoring,OU=Service Accounts,DC=corp,DC=local
      bind_pw  = M0nitor!ng2024

      # Search filters
      user_filter   = (&(objectClass=user)(objectCategory=person))
      group_filter  = (objectClass=group)
      computer_filter = (objectClass=computer)

      # Monitored OUs
      search_base[] = OU=Corp Users,DC=corp,DC=local
      search_base[] = OU=Servers,DC=corp,DC=local
      search_base[] = OU=Service Accounts,DC=corp,DC=local
    mode: '0644'
    owner: root
    group: root

- name: Place backup LDAP config in home directory
  ansible.builtin.copy:
    dest: /opt/.ldap-backup.conf
    content: |
      # Backup LDAP configuration
      LDAP_HOST=172.16.50.10
      LDAP_USER=svc_monitoring@corp.local
      LDAP_PASS=M0nitor!ng2024
      LDAP_BASE=DC=corp,DC=local
    mode: '0644'
    owner: root
    group: root

# ---- Configure Apache for monitoring ----
- name: Configure monitoring VirtualHost
  ansible.builtin.copy:
    dest: /etc/apache2/sites-available/monitoring.conf
    content: |
      <VirtualHost *:80>
          ServerName mon01.corp.local
          DocumentRoot /var/www/html/monitoring
          <Directory /var/www/html/monitoring>
              AllowOverride All
              Require all granted
          </Directory>
      </VirtualHost>

- name: Enable monitoring site
  ansible.builtin.shell: |
    a2ensite monitoring.conf
    a2dissite 000-default.conf
    systemctl reload apache2
